<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - License Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1>License Management</h1>
                <p>Admin Dashboard</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="supabaseUrl">
                        <i class="fas fa-database"></i> Supabase URL
                    </label>
                    <input type="url" id="supabaseUrl" required placeholder="https://xxxxx.supabase.co" autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="supabaseKey">
                        <i class="fas fa-key"></i> Supabase API Key
                    </label>
                    <input type="password" id="supabaseKey" required placeholder="Enter your Supabase anon key" autocomplete="off">
                </div>

                <div id="errorMessage" class="error-message" style="display: none;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorText"></span>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div class="login-footer">
                <p><i class="fas fa-info-circle"></i> Contact admin for access</p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="config.js"></script>
</body>
</html>
